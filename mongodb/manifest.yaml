apiVersion: v1
kind: deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    env: dev
    component: mongodb
    tier: db
spec: 
  replicas: 1
  selector: 
    matchLabels:
      project: roboshop
      env: dev
      component: mongodb
      tier: db
  template:
    metadata:
      labels:
        project: roboshop
        env: dev
        component: mongodb
        tier: db
    spec:
      containers:
        - name: mongodb
          image: ruthvikk1214/mongodb:1.0
          ports:
            - containerPort: 27017
              name: mongodb
---
apiVersion: v1
kind: service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    env: dev
    component: mongodb
    tier: db
spec: 
  selector:
    project: roboshop
    env: dev
    component: mongodb
    tier: db
  ports:
    - port: 27017
      targetPort: 27017
      name: mongodb