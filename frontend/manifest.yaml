apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    env: dev
    component: frontend
    tier: frontend
data:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  AMQP_HOST: "rabbitmq"
  AMQP_USER: "roboshop"
  AMQP_PASS: "roboshop123"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    env: dev
    component: frontend
    tier: frontend
spec: 
  replicas: 1
  selector: 
    matchLabels:
      project: roboshop
      env: dev
      component: frontend
      tier: frontend
  template:
    metadata:
      labels:
        project: roboshop
        env: dev
        component: frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: ruthvikk1214/frontend:1.0
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 2
            periodSeconds: 10
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /       # Changed from /health to avoid 404 crashes
              port: 80
            failureThreshold: 2
            periodSeconds: 10
            initialDelaySeconds: 5
          startupProbe:
            httpGet:
              path: /       # Changed from /health to avoid 404 crashes
              port: 80
            failureThreshold: 20
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    env: dev
    component: frontend
    tier: frontend
spec: 
  type: LoadBalancer
  selector:
    project: roboshop
    env: dev
    component: frontend
    tier: frontend
  ports:
    - port: 80
      targetPort: 80
      name: frontend